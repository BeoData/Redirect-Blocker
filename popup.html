<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirect Blocker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary:   #0d1117;
      --bg-card:      rgba(255, 255, 255, 0.05);
      --bg-card-hover:rgba(255, 255, 255, 0.08);
      --accent-on:    #16c79a;
      --accent-off:   #e63946;
      --accent-mid:   #4cc9f0;
      --text-primary: #f0f6fc;
      --text-muted:   rgba(240, 246, 252, 0.5);
      --border:       rgba(255, 255, 255, 0.08);
      --radius:       14px;
      --radius-sm:    8px;
    }

    body {
      width: 310px;
      padding: 18px;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #0d1117 0%, #0f1b2d 100%);
      color: var(--text-primary);
      user-select: none;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #0f3460, #16c79a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .header-text span {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── Stats card ──────────────────────────── */
    .stats-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    .stats-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(22, 199, 154, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .count-value {
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #16c79a, #4cc9f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
      transition: transform 0.15s ease;
    }

    .count-value.bump {
      transform: scale(1.12);
    }

    .count-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Status badge ────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 10px;
      letter-spacing: 0.3px;
      transition: all 0.3s ease;
    }

    .status-badge.active {
      background: rgba(22, 199, 154, 0.15);
      color: var(--accent-on);
      border: 1px solid rgba(22, 199, 154, 0.3);
    }

    .status-badge.inactive {
      background: rgba(230, 57, 70, 0.15);
      color: var(--accent-off);
      border: 1px solid rgba(230, 57, 70, 0.3);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-dot.pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Buttons ─────────────────────────────── */
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.3s ease;
      letter-spacing: 0.2px;
    }

    .btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .btn:active { transform: translateY(0);    box-shadow: none; }

    .btn-toggle {
      background: linear-gradient(135deg, #16c79a, #0f9e7b);
      color: #fff;
      margin-bottom: 8px;
    }

    .btn-toggle.off {
      background: linear-gradient(135deg, #e63946, #b71c1c);
    }

    .btn-reset {
      background: var(--bg-card);
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-weight: 500;
    }

    .btn-reset:hover {
      color: var(--text-primary);
      background: var(--bg-card-hover);
    }

    /* ── Footer ──────────────────────────────── */
    .footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      font-size: 10px;
      color: var(--text-muted);
    }

    .footer-brand a {
      color: var(--accent-mid);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-brand a:hover { text-decoration: underline; }

    .footer-scope {
      font-size: 10px;
      color: var(--text-muted);
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🛡️</div>
    <div class="header-text">
      <h1>Redirect Blocker</h1>
      <span>by BeoData</span>
    </div>
  </div>

  <div class="stats-card">
    <div class="count-value" id="count">0</div>
    <div class="count-label">redirects blocked</div>
    <div class="status-badge active" id="statusBadge">
      <span class="status-dot pulse" id="statusDot"></span>
      <span id="statusText">Protection Active</span>
    </div>
  </div>

  <button class="btn btn-toggle" id="toggleBtn">
    <span id="toggleIcon">🔴</span>
    <span id="toggleLabel">Disable Protection</span>
  </button>

  <button class="btn btn-reset" id="resetBtn">
    ↻ Reset Counter
  </button>

  <div class="footer">
    <div class="footer-brand">
      <a href="https://beodata.rs" target="_blank">beodata.rs</a>
    </div>
    <div class="footer-scope">Ads · Popups · Affiliates</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
