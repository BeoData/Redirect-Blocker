<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirect Blocker — Blocked Domains</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --bg-card:      #161b22;
      --bg-input:     #0d1117;
      --border:       rgba(255,255,255,0.08);
      --border-focus: #16c79a;
      --accent:       #16c79a;
      --accent-dark:  #0f9e7b;
      --danger:       #e63946;
      --danger-dark:  #b71c1c;
      --text:         #f0f6fc;
      --text-muted:   rgba(240,246,252,0.45);
      --tag-bg:       rgba(22,199,154,0.1);
      --tag-border:   rgba(22,199,154,0.25);
      --radius:       12px;
      --radius-sm:    8px;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #0f3460, #16c79a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ── Card ────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .count-badge {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--accent);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 100px;
      letter-spacing: 0;
      text-transform: none;
      font-weight: 600;
    }

    /* ── Add form ────────────────────────────── */
    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .add-form input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input::placeholder { color: var(--text-muted); }
    .add-form input:focus { border-color: var(--border-focus); }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-add:hover  { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(22,199,154,0.25); }
    .btn-add:active { transform: none; box-shadow: none; }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Toast ───────────────────────────────── */
    .toast {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .toast.success {
      background: rgba(22,199,154,0.12);
      border: 1px solid rgba(22,199,154,0.25);
      color: var(--accent);
      display: flex;
    }

    .toast.error {
      background: rgba(230,57,70,0.12);
      border: 1px solid rgba(230,57,70,0.25);
      color: var(--danger);
      display: flex;
    }

    /* ── Domain list ─────────────────────────── */
    .domain-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .domain-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .domain-item:hover { background: rgba(255,255,255,0.055); }

    .domain-name {
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: var(--accent);
      word-break: break-all;
    }

    .btn-remove {
      background: transparent;
      border: 1px solid rgba(230,57,70,0.3);
      color: var(--danger);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      margin-left: 12px;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-remove:hover  { background: rgba(230,57,70,0.12); transform: scale(1.04); }
    .btn-remove:active { transform: scale(0.98); }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 24px 0;
    }

    /* ── Built-in collapsible ────────────────── */
    .builtin-toggle {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      transition: color 0.15s;
    }

    .builtin-toggle:hover { color: var(--text); }

    .builtin-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }

    .builtin-toggle.open .arrow { transform: rotate(90deg); }

    .builtin-list {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
    }

    .builtin-list.visible { display: flex; }

    .builtin-tag {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
    }

    /* ── Footer ──────────────────────────────── */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 32px;
    }

    .footer a { color: #4cc9f0; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="header-icon">🛡️</div>
      <div>
        <h1>Redirect Blocker</h1>
        <p>Manage your custom blocked domains</p>
      </div>
    </div>

    <!-- Custom domains card -->
    <div class="card">
      <div class="card-title">
        Custom blocked domains
        <span class="count-badge" id="customCount">0</span>
      </div>

      <div class="add-form">
        <input
          type="text"
          id="domainInput"
          placeholder="e.g. example.com or https://example.com/page"
          autocomplete="off"
          spellcheck="false"
        >
        <button class="btn-add" id="addBtn">+ Add</button>
      </div>

      <div class="toast" id="toast"></div>

      <div class="domain-list" id="customList">
        <div class="empty-state" id="emptyState">
          No custom domains yet. Add one above.
        </div>
      </div>
    </div>

    <!-- Built-in domains card -->
    <div class="card">
      <div class="card-title">Built-in blocked domains</div>
      <button class="builtin-toggle" id="builtinToggle">
        <span class="arrow">▶</span> Show built-in list
      </button>
      <div class="builtin-list" id="builtinList"></div>
    </div>

    <div class="footer">
      <a href="https://beodata.rs" target="_blank">BeoData</a> &mdash;
      Redirect Blocker v1.2.0 &mdash; MIT License
    </div>

  </div>
  <script src="options.js"></script>
</body>
</html>
